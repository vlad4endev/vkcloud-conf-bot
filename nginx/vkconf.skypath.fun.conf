# Один домен: vkconf.skypath.fun
#   /           → dist-miniapp (мини-приложение MAX)
#   /api/       → admin:3001
#   /webhook    → bot:3000
#   /health     → bot:3000

upstream vkconf_bot {
    server 127.0.0.1:3000;
}

upstream vkconf_admin {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name vkconf.skypath.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vkconf.skypath.fun;

    ssl_certificate     /etc/letsencrypt/live/vkconf.skypath.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vkconf.skypath.fun/privkey.pem;

    client_max_body_size 12m;

    location /webhook {
        proxy_pass http://vkconf_bot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://vkconf_bot/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://vkconf_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://vkconf_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://vkconf_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Miniapp (SPA). @spa_fallback — без цикла redirect, даже если index.html временно отсутствует.
    location / {
        root /var/www/vkconf/dist-miniapp;
        try_files $uri $uri/ @spa_fallback;
    }

    location @spa_fallback {
        root /var/www/vkconf/dist-miniapp;
        try_files /index.html =404;
    }
}
