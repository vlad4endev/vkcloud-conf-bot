# Один домен: vkconf.skypath.fun
#   /           → dist-miniapp (мини-приложение MAX)
#   /panel/     → /var/www/vkconf/panel (веб-админка)
#   /api/       → admin:3001
#   /webhook    → bot:3000
#   /health     → bot:3000

upstream vkconf_bot {
    server 127.0.0.1:3000;
}

upstream vkconf_admin {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name vkconf.skypath.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vkconf.skypath.fun;

    ssl_certificate     /etc/letsencrypt/live/vkconf.skypath.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vkconf.skypath.fun/privkey.pem;

    client_max_body_size 12m;

    location /webhook {
        proxy_pass http://vkconf_bot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://vkconf_bot/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://vkconf_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://vkconf_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Админ-панель: файлы в /var/www/vkconf/panel/ (см. publish-admin-panel.sh)
    location = /panel {
        return 301 /panel/;
    }

    location ^~ /panel/ {
        root /var/www/vkconf;
        index index.html;
        try_files $uri $uri/ /panel/index.html;
    }

    location /uploads/ {
        proxy_pass http://vkconf_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Miniapp (SPA). =404 в конце — без цикла, если index.html ещё не залит.
    location / {
        root /var/www/vkconf/dist-miniapp;
        index index.html;
        try_files $uri $uri/ /index.html =404;
    }
}
