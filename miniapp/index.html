<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>VK Cloud Conf 2026</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        min-height: 100%;
        background: #0a0f1e;
        color: #e8edf5;
      }
      #root {
        width: 100%;
        max-width: 100%;
        min-height: 100svh;
        min-height: 100dvh;
        overflow-x: hidden;
      }
    </style>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
  </head>
  <body>
    <div id="root">
      <p style="margin: 16px; font-family: system-ui, sans-serif; color: #e8edf5">
        Загрузка…
      </p>
    </div>
    <script>
      (function () {
        var root = document.getElementById('root');
        var reported = false;

        function showError(message) {
          if (reported) return;
          reported = true;
          root.innerHTML =
            '<pre style="margin:16px;font:13px/1.5 system-ui;color:#ff8a8a;white-space:pre-wrap">' +
            message +
            '</pre>';
        }

        window.addEventListener('error', function (event) {
          var src = event.filename || '';
          if (src.indexOf('/assets/') !== -1 || src.indexOf('main') !== -1) {
            showError('Ошибка JS: ' + (event.message || 'unknown') + '\n' + src);
          }
        });

        window.addEventListener('unhandledrejection', function (event) {
          showError('Promise: ' + (event.reason && event.reason.message ? event.reason.message : event.reason));
        });

        setTimeout(function () {
          if (!window.__MINIAPP_MOUNTED__) {
            showError(
              'React не запустился за 10 с.\n' +
                'Откройте /diag.html в MAX для проверки WebView.\n' +
                'На сервере: git pull && ./scripts/publish-miniapp.sh',
            );
          }
        }, 10000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
