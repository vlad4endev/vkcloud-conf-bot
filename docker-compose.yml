services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      [
        'postgres',
        '-c',
        'max_connections=100',
        '-c',
        'shared_buffers=256MB',
        '-c',
        'work_mem=4MB',
      ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vkconf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vkconf_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vkcloud_conf}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vkconf}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vkconf}:${POSTGRES_PASSWORD:-vkconf_secret}@postgres:5432/${POSTGRES_DB:-vkcloud_conf}
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vkconf}:${POSTGRES_PASSWORD:-vkconf_secret}@postgres:5432/${POSTGRES_DB:-vkcloud_conf}
      BOT_INTERNAL_URL: http://bot:3000
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-vkconf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vkconf_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vkcloud_conf}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-2}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - ./scripts/backup-entrypoint.sh:/scripts/backup-entrypoint.sh:ro
      - uploads_data:/uploads:ro
    entrypoint: ['/bin/sh', '/scripts/backup-entrypoint.sh']
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
