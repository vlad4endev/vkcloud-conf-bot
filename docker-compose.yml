services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vkcloud_conf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "3000:3000"
      - "3001:3001"
    restart: unless-stopped

volumes:
  postgres_data:
